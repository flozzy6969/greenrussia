<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Green Russia — официальный сайт</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:radial-gradient(circle at 10%20%,#0a1f0e,#030a05);font-family:system-ui,sans-serif;color:#eef5e9;min-height:100vh;}
        
        /* МЕНЮ (три полоски) */
        .sidebar{
            position:fixed;top:0;left:-280px;width:280px;height:100%;background:#0a1a08;
            border-right:2px solid #6fbf4c;transition:0.3s;padding:25px;z-index:1000;
            box-shadow:5px 0 25px rgba(0,0,0,0.5);
        }
        .sidebar.open{left:0;}
        .menu-toggle{
            position:fixed;top:20px;left:20px;background:#000000aa;border:1px solid #6fbf4c;
            border-radius:14px;padding:10px 14px;cursor:pointer;z-index:1001;color:#6fbf4c;font-size:26px;
        }
        .close-sidebar{background:none;border:none;color:#fff;font-size:28px;cursor:pointer;float:right;}
        .sidebar-menu{list-style:none;margin-top:50px;clear:both;}
        .sidebar-menu li{margin:25px 0;}
        .sidebar-menu a{color:#fff;text-decoration:none;font-size:20px;display:flex;align-items:center;gap:12px;}
        .sidebar-menu a:hover{color:#6fbf4c;}
        
        .wrapper{max-width:1100px;margin:0 auto;padding:70px 20px 20px;}
        .hero{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:30px;}
        .bear-icon{font-size:70px;filter:drop-shadow(0 0 8px #6fbf4c);}
        .title h1{font-size:2.5rem;background:linear-gradient(135deg,#c4ff9e,#6fbf4c);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .card{background:#0f1f0c;border-radius:32px;padding:28px;margin:25px 0;border:1px solid #2c5a1f;}
        .btn{
            background:#6fbf4c;border:none;padding:16px 32px;border-radius:60px;font-weight:bold;
            cursor:pointer;margin:8px;color:#071a05;font-size:1.2rem;display:inline-flex;align-items:center;gap:12px;transition:0.2s;
        }
        .btn:hover{transform:scale(1.02);background:#87d462;}
        .btn-donate{background:linear-gradient(135deg,#ff9800,#ff5722);color:white;}
        .promo-area{background:#0a1a08;border-radius:32px;padding:24px;text-align:center;margin:15px 0;}
        .promo-input{background:#1b2b16;border:1px solid #6fbf4c;padding:16px;border-radius:60px;width:70%;color:#fff;font-size:1.1rem;text-align:center;}
        .promo-message{margin-top:20px;padding:14px;border-radius:32px;font-weight:bold;}
        .promo-list{background:#1a2a16;border-radius:28px;padding:20px;margin-top:20px;}
        .promo-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #2c5a1f;}
        .green-text{color:#6fbf4c;font-weight:bold;}
        .footer{text-align:center;margin-top:40px;padding:20px;border-top:1px solid #2c4b21;}
        .instruction-step{background:#1a2a16;padding:15px;border-radius:24px;margin:15px 0;}
        .instruction-step i{font-size:24px;margin-right:12px;color:#6fbf4c;}
        code{background:#0a1a08;padding:4px 10px;border-radius:20px;font-family:monospace;}
        .info-grid{display:flex;flex-wrap:wrap;gap:20px;margin-top:15px;}
        .info-item{flex:1;min-width:200px;background:#1a2a16;border-radius:24px;padding:20px;text-align:center;}
        .info-item i{font-size:36px;color:#6fbf4c;margin-bottom:12px;display:block;}
        @media (max-width:720px){.hero{flex-direction:column;text-align:center;}.promo-input{width:90%;}}
    </style>
</head>
<body>

<div class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></div>
<div class="sidebar" id="sidebar">
    <button class="close-sidebar" id="closeSidebar">&times;</button>
    <ul class="sidebar-menu">
        <li><a href="#" id="navHome"><i class="fas fa-home"></i> Главная</a></li>
        <li><a href="#" id="navPromo"><i class="fas fa-ticket-alt"></i> Промокоды</a></li>
        <li><a href="#" id="navIphone"><i class="fab fa-apple"></i> Информация для iPhone</a></li>
        <li><a href="#" id="navPc"><i class="fas fa-laptop-code"></i> Информация для ПК</a></li>
    </ul>
    <hr style="margin:30px 0;">
    <div style="text-align:center;">Сервер <strong>Moscow</strong><br>🐻 Green Russia</div>
</div>

<div class="wrapper" id="app"></div>

<script>
    // Закрытие меню
    function closeMenu() { document.getElementById("sidebar").classList.remove("open"); }
    document.getElementById("menuToggle").onclick = () => document.getElementById("sidebar").classList.add("open");
    document.getElementById("closeSidebar").onclick = closeMenu;

    // Промокоды
    const PROMOCODES = {
        "WELCOME": "5.000.000",
        "GREENWEEK": "10.000.000",
        "TOP25": "50.000.000"
    };
    let usedCodes = JSON.parse(localStorage.getItem("gr_used_promocodes")) || [];

    function showMessage(text, isError = false) {
        const msgDiv = document.getElementById("promoMessage");
        if (!msgDiv) return;
        msgDiv.innerHTML = text;
        msgDiv.style.backgroundColor = isError ? "#5a1a1a" : "#1a3a1a";
        msgDiv.style.border = "1px solid " + (isError ? "#ff6666" : "#6fbf4c");
        setTimeout(() => { if(msgDiv) msgDiv.innerHTML = ""; }, 5000);
    }

    function activatePromo() {
        const input = document.getElementById("promoInput");
        if (!input) return;
        let code = input.value.trim().toUpperCase();
        if (!code) { showMessage("❌ Введи промокод!", true); return; }
        if (usedCodes.includes(code)) { showMessage("❌ Ты уже активировал этот промокод!", true); return; }
        if (PROMOCODES[code]) {
            usedCodes.push(code);
            localStorage.setItem("gr_used_promocodes", JSON.stringify(usedCodes));
            showMessage(`✅ Промокод ${code} активирован!\nНаграда: ${PROMOCODES[code]}\n\nНапиши @wflossy с ником и кодом "${code}"`);
            input.value = "";
        } else {
            showMessage(`❌ Код "${code}" не найден. Доступны: WELCOME, GREENWEEK, TOP25`, true);
        }
    }

    function renderHome() {
        const app = document.getElementById("app");
        app.innerHTML = `
            <div class="hero">
                <div><div class="bear-icon">🐻‍❄️🐻</div><div class="title"><h1>GREEN RUSSIA</h1><p>Ролевая игра на сервере Moscow</p></div></div>
            </div>
            <div class="card">
                <div class="info-grid">
                    <div class="info-item"><i class="fas fa-hand-fist"></i><h3>Уличные войны</h3><p>Сражайся за районы Москвы</p></div>
                    <div class="info-item"><i class="fas fa-users"></i><h3>Семьи и кланы</h3><p>Создай свою семью или вступи в легендарную</p></div>
                    <div class="info-item"><i class="fas fa-chart-line"></i><h3>Прокачка</h3><p>Развивай персонажа, становись сильнее</p></div>
                </div>
            </div>
            <div class="card">
                <h2><i class="fas fa-download"></i> Скачать игру</h2>
                <a href="https://disk.yandex.ru/d/2lTyrQzPeNO03Q" target="_blank"><button class="btn"><i class="fab fa-android"></i> GreenRussia.apk (32 МБ)</button></a>
            </div>
            <div class="card">
                <h2><i class="fas fa-heart"></i> Поддержать проект</h2>
                <a href="https://finance.ozon.ru/apps/sbp/ozonbankpay/019bfe74-6fa5-7117-8665-deae385c367f" target="_blank"><button class="btn btn-donate"><i class="fas fa-heart"></i> Озон Банк (анонимно)</button></a>
            </div>
            <div class="footer">Green Russia — официальный сайт | По всем вопросам: @wflossy</div>
        `;
    }

    function renderPromoPage() {
        const app = document.getElementById("app");
        app.innerHTML = `
            <div class="card">
                <h2 style="text-align:center;"><i class="fas fa-ticket-alt"></i> Активировать промокод</h2>
                <div class="promo-area">
                    <input type="text" id="promoInput" class="promo-input" placeholder="Введи код, например WELCOME">
                    <br><br>
                    <button id="activatePromoBtn" class="btn"><i class="fas fa-check"></i> Активировать</button>
                    <div id="promoMessage" class="promo-message"></div>
                </div>
                <div class="promo-list">
                    <h3>🎁 Доступные промокоды:</h3>
                    <div class="promo-item"><span><strong>WELCOME</strong></span><span class="green-text">5.000.000</span></div>
                    <div class="promo-item"><span><strong>GREENWEEK</strong></span><span class="green-text">10.000.000</span></div>
                    <div class="promo-item"><span><strong>TOP25</strong></span><span class="green-text">50.000.000</span></div>
                </div>
                <p style="text-align:center;">💡 После активации напиши <strong>@wflossy</strong> в Telegram с ником и кодом — я выдам награду!</p>
            </div>
            <div class="footer">Green Russia — официальный сайт | @wflossy</div>
        `;
        document.getElementById("activatePromoBtn")?.addEventListener("click", activatePromo);
    }

    function renderIphone() {
        const app = document.getElementById("app");
        app.innerHTML = `
            <div class="card">
                <h2><i class="fab fa-apple"></i> Как играть на iPhone</h2>
                <div class="instruction-step"><i class="fas fa-download"></i> <strong>1. Скачай iSH Shell</strong><br>Найди в App Store приложение <code>iSH Shell</code> (бесплатно)</div>
                <div class="instruction-step"><i class="fas fa-terminal"></i> <strong>2. Открой iSH Shell</strong><br>Введи команду: <code>apk add wget</code> и нажми Enter</div>
                <div class="instruction-step"><i class="fas fa-cloud-download-alt"></i> <strong>3. Скачай APK</strong><br>Введи: <code>wget https://disk.yandex.ru/d/2lTyrQzPeNO03Q</code></div>
                <div class="instruction-step"><i class="fas fa-cube"></i> <strong>4. Установи игру</strong><br>Введи: <code>apk add ./GreenRussia.apk</code></div>
                <div class="instruction-step"><i class="fas fa-gamepad"></i> <strong>5. Играй!</strong><br>Игра появится в меню iPhone</div>
                <p style="margin-top:15px;"><i class="fas fa-question-circle"></i> Если не получается — напиши @wflossy</p>
            </div>
            <div class="footer">Green Russia | iPhone инструкция</div>
        `;
    }

    function renderPc() {
        const app = document.getElementById("app");
        app.innerHTML = `
            <div class="card">
                <h2><i class="fas fa-laptop-code"></i> Как играть на компьютере</h2>
                <div class="instruction-step"><i class="fas fa-download"></i> <strong>1. Скачай Bluestacks</strong><br>Официальный сайт: <a href="https://www.bluestacks.com" target="_blank" style="color:#6fbf4c;">bluestacks.com</a> (бесплатно)</div>
                <div class="instruction-step"><i class="fas fa-play-circle"></i> <strong>2. Установи и открой Bluestacks</strong><br>Дождись загрузки эмулятора</div>
                <div class="instruction-step"><i class="fas fa-globe"></i> <strong>3. Зайди на сайт</strong><br>Внутри Bluestacks открой браузер и перейди на <code>flozzy6969.github.io/greenrussia</code></div>
                <div class="instruction-step"><i class="fas fa-cloud-download-alt"></i> <strong>4. Скачай APK</strong><br>Нажми на кнопку «Скачать APK»</div>
                <div class="instruction-step"><i class="fas fa-cube"></i> <strong>5. Установи и играй!</strong><br>Нажми на скачанный файл → установить → запустить</div>
                <p style="margin-top:15px;"><i class="fas fa-question-circle"></i> Если не получается — напиши @wflossy</p>
            </div>
            <div class="footer">Green Russia | PC инструкция</div>
        `;
    }

    // Навигация с закрытием меню
    document.getElementById("navHome").onclick = (e) => { e.preventDefault(); renderHome(); closeMenu(); };
    document.getElementById("navPromo").onclick = (e) => { e.preventDefault(); renderPromoPage(); closeMenu(); };
    document.getElementById("navIphone").onclick = (e) => { e.preventDefault(); renderIphone(); closeMenu(); };
    document.getElementById("navPc").onclick = (e) => { e.preventDefault(); renderPc(); closeMenu(); };

    renderHome();
</script>
</body>
</html>
